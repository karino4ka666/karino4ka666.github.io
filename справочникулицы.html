<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник предприятий города</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 300px;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .animal {
            text-align: center;
            margin-top: 20px;
        }

        img {
            max-width: 100px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Справочник предприятий города</h1>
        <p>Введите слово для поиска (например, "кафе").</p>
    </div>

    <div class="search-container">
        <input type="text" id="businessName" placeholder="Введите слово для поиска" required>
        <button onclick="searchBusiness()">Искать</button>
    </div>

    <div class="results" id="results"></div>

    <div class="animal">
        <h2>Ваш помощник:</h2>
        <img src="photo_2025-02-19_22-34-15.jpg" alt="Робото-животное"> <!-- Замените на ваш путь к изображению -->
        <p>Я здесь, чтобы помочь вам!</p>
    </div>

    <script>
        const businesses = {
            "Кафе 'Светлый день'": {
                address: "ул. Солнечная, 10",
                profile: "Кафе, столовая",
                website: "www.svetlyden.ru"
            },
            "Магазин 'Все для дома'": {
                address: "ул. Дачная, 25",
                profile: "Магазин бытовой техники",
                website: "www.vsedlyadoma.ru"
            },
            "Фитнес-центр 'Виталити'": {
                address: "пр. Спортивный, 15",
                profile: "Фитнес и спорт",
                website: "www.vitalityfitness.ru"
            },
            "Кафе 'Зеленый рай'": {
                address: "ул. Лесная, 5",
                profile: "Кафе, столовая",
                website: "www.zelenyrai.ru"
            },
            "Кулинария 'Сладкий дом'": {
                address: "ул. Кулинарная, 12",
                profile: "Кулинария и кондитерская",
                website: "www.sladkydom.ru"
            },
        };

        function searchBusiness() {
            const name = document.getElementById("businessName").value.toLowerCase();
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = ""; // Очищаем предыдущие результаты

            // Фильтруем предприятия по введенному слову
            const results = Object.keys(businesses).filter(key => key.toLowerCase().includes(name));

            if (results.length > 0) {
                resultsDiv.innerHTML = "<h3>Найдены предприятия:</h3><ul>";
                results.forEach(key => {
                    resultsDiv.innerHTML += `<li>${businesses[key].address}</li>`;
                });
                resultsDiv.innerHTML += "</ul>";
            } else {
                resultsDiv.innerHTML = "<p>Предприятие не найдено. Попробуйте другое слово.</p>";
            }
        }
    </script>
</body>

</html>
